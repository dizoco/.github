name: CD Node → Azure App Service

# Workflow reusable de despliegue para proyectos Node/Vite (SPA) vía zip deploy
# nativo (build + azure/webapps-deploy). Pensado para App Service Linux en el
# plan Free compartido rg-dyzoco-common / asp-dyzoco-linux. El App Service debe
# tener configurado el startup command `pm2 serve /home/site/wwwroot --no-daemon --spa`
# para servir el build estático con fallback de rutas de cliente.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Versión de Node (ej. 22.x)'
        type: string
        default: '22.x'
      working-directory:
        description: 'Directorio donde está el package.json'
        type: string
        default: '.'
      build-command:
        description: 'Comando de build'
        type: string
        default: 'npm run build'
      artifact-path:
        description: 'Carpeta generada por el build a desplegar (relativa a working-directory)'
        type: string
        default: 'dist'
      app-name:
        description: 'Nombre del Azure App Service destino'
        type: string
        required: true
    secrets:
      publish-profile:
        description: 'Publish profile del App Service (secreto AZURE_WEBAPP_PUBLISH_PROFILE del repo)'
        required: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: build-and-deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.app-name }}
          publish-profile: ${{ secrets.publish-profile }}
          package: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
